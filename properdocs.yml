site_name: Piano Tech
site_url: "https://etn-beep.github.io/pianos-landi/"
site_description: "Documentation technique du piano : mécanique, acoustique, accordage, histoire et systèmes modernes."

use_directory_urls: true
edit_uri: ""

theme:
  name: material
  language: fr

  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Mode clair
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Mode sombre

  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - search.highlight

markdown_extensions:
  - footnotes

nav:
  - Français:
      - Accueil: fr/index.md
      - Histoire: fr/histoire/index.md
      - Accordage: fr/accordage/index.md
      - Fonctionnement: fr/fonctionnement/index.md
      - Acoustique: fr/acoustique/index.md
      - Conseils: fr/conseils/index.md
      - Silent: fr/silent/index.md
      - Dampp-Chaser: fr/dampp-chaser/index.md

  - Español:
      - Inicio: es/index.md
      - Historia: es/historia/index.md
      - Afinación: es/afinacion/index.md
      - Funcionamiento: es/funcionamiento/index.md
      - Acústica: es/acustica/index.md
      - Consejos: es/consejos/index.md
      - Silent: es/silent/index.md
      - Dampp-Chaser: es/dampp-chaser/index.md

repo_url: "https://github.com/etn-beep/pianos-landi"
repo_name: "etn-beep/pianos-landi"

extra:
  alternate:
    - name: Français
      link: "https://etn-beep.github.io/pianos-landi/fr/"
      lang: fr
    - name: Español
      link: "https://etn-beep.github.io/pianos-landi/es/"
      lang: es