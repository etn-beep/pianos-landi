name: Deploy ProperDocs to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6 # ⬅️ Mis à jour (v4 -> v6)
      
      - name: Setup Python
        uses: actions/setup-python@v6 # ⬅️ Mis à jour (v5 -> v6)
        with:
          python-version: '3.x'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # Force l'installation de properdocs et material si besoin
          pip install properdocs mkdocs-material
      
      - name: Build site
        run: properdocs build
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5 # ⬅️ Mis à jour (v3 -> v5)
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5 # ⬅️ Mis à jour (v4 -> v5)
